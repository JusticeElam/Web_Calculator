<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="calc.css">
</head>
<body>
    <header>
        <img src="profile_pic_1.jpg" alt="">
        <a href="">Portfolio</a>
    </header>

    <main>
        <div class="calculator">
            <input id="display" readonly>
            <div class="keys">
                <button class="btn1" onclick="appendToDisplay('+')">+</button>
                <button class="btn2" onclick="appendToDisplay('7')">7</button>
                <button class="btn2" onclick="appendToDisplay('8')">8</button>
                <button class="btn2" onclick="appendToDisplay('9')">9</button>
                <button class="btn1" onclick="appendToDisplay('-')">-</button>
                <button class="btn2" onclick="appendToDisplay('4')">4</button>
                <button class="btn2" onclick="appendToDisplay('5')">5</button>
                <button class="btn2" onclick="appendToDisplay('6')">6</button>
                <button class="btn1" onclick="appendToDisplay('*')">*</button>
                <button class="btn2" onclick="appendToDisplay('1')">1</button>
                <button class="btn2" onclick="appendToDisplay('2')">2</button>
                <button class="btn2" onclick="appendToDisplay('3')">3</button>
                <button class="btn1" onclick="appendToDisplay('/')">/</button>
                <button class="btn2" onclick="appendToDisplay('0')">0</button>
                <button class="btn2" onclick="appendToDisplay('.')">.</button>
                <button class="btn1" onclick="appendToDisplay('%')">%</button>
                <button class="btn1" onclick="clearDisplay('')">C</button>
                <button class="btn1" onclick="deleteDisplay('')">X</button>
                <button class="btn3"  onclick="calculate('')">=</button>
            </div>

        </div>
    </main>
